resources:
  jobs:
    allianz_full_refresh:
      name: "Allianz — Full Refresh (data gen → external land → bronze ingest → DLT → event report)"
      email_notifications:
        on_failure:
          - ${var.notifications_email}
      environments:
        - environment_key: default
          spec:
            client: "4"
            dependencies:
              - polars
              - numpy
              - mimesis
              - httpx
              - databricks-sdk
        - environment_key: report
          spec:
            client: "4"
            dependencies:
              - reportlab
              - python-docx
              - databricks-sdk
      tasks:
        - task_key: synthetic_data
          spark_python_task:
            python_file: ../src/generate_data.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.bronze_schema}
          environment_key: default

        - task_key: land_external
          depends_on:
            - task_key: synthetic_data
          spark_python_task:
            python_file: ../src/external_feeds.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --volume-schema
              - ${var.bronze_schema}
              - --volume
              - landing
          environment_key: default

        - task_key: ingest_external
          depends_on:
            - task_key: land_external
          spark_python_task:
            python_file: ../src/ingest_external.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.bronze_schema}
              - --volume
              - landing
          environment_key: default

        - task_key: dlt_run
          depends_on:
            - task_key: ingest_external
          pipeline_task:
            pipeline_id: ${resources.pipelines.allianz_dlt.id}
            full_refresh: true

        - task_key: event_report
          depends_on:
            - task_key: dlt_run
          spark_python_task:
            python_file: ../src/event_report.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --volume-schema
              - ${var.bronze_schema}
              - --volume
              - landing
              - --format
              - both
          environment_key: report

    allianz_external_feeds_hourly:
      name: "Allianz — External Feeds (hourly)"
      email_notifications:
        on_failure:
          - ${var.notifications_email}
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: UTC
        pause_status: PAUSED
      environments:
        - environment_key: default
          spec:
            client: "4"
            dependencies:
              - polars
              - httpx
              - databricks-sdk
        - environment_key: report
          spec:
            client: "4"
            dependencies:
              - reportlab
              - python-docx
              - databricks-sdk
      tasks:
        - task_key: land_external
          spark_python_task:
            python_file: ../src/external_feeds.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --volume-schema
              - ${var.bronze_schema}
              - --volume
              - landing
          environment_key: default
        - task_key: ingest_external
          depends_on:
            - task_key: land_external
          spark_python_task:
            python_file: ../src/ingest_external.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.bronze_schema}
              - --volume
              - landing
          environment_key: default
        - task_key: dlt_refresh
          depends_on:
            - task_key: ingest_external
          pipeline_task:
            pipeline_id: ${resources.pipelines.allianz_dlt.id}
            full_refresh: false
        - task_key: event_report
          depends_on:
            - task_key: dlt_refresh
          spark_python_task:
            python_file: ../src/event_report.py
            parameters:
              - --catalog
              - ${var.catalog}
              - --volume-schema
              - ${var.bronze_schema}
              - --volume
              - landing
              - --format
              - both
          environment_key: report
